<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404</title>
    <meta name="robots" content="noindex, nofollow"> 
    <meta name="description" content="La página que buscas no existe. Vuelve al inicio de nuestra plataforma educativa.">
    <link rel="stylesheet" href="/css/colores.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/404.css">
</head>
<body>
    <!-- Página sencilla, sin header ni footer, para que el usuario pueda volver al inicio de la web. -->
    <main class="error-404-contenedor">
        <h1>Error 404 </h1>
        <h2>Pagina no encontrada</h2>

        <h3>¡Ups! Parece que nos perdimos</h3>
        
        <img src="../img/404.gif" alt="Hombre frustrado tecleando y golpeando su computadora portátil" class="gif-404">
        
        <p>La página que estás buscando no existe, fue movida o el enlace es incorrecto.</p>
        
        <a href="/index.html" class="btn-principal">Volver al Inicio</a>
    </main>

    <script src="/js/main.js"></script>
</body>
</html>
